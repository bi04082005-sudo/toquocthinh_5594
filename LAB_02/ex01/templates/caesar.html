<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caesar Cipher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">CAESAR CIPHER</h2>

    <!-- ================= ENCRYPT ================= -->

    <h4 class="text-primary">ENCRYPTION</h4>

    <form method="POST" action="/caesar/encrypt">

        <div class="form-group">
            <label>Plain Text</label>
            <input
                    type="text"
                    class="form-control"
                    name="inputPlainText"
                    placeholder="Enter plain text"
                    required>
        </div>

        <div class="form-group">
            <label>Key</label>
            <input
                    type="number"
                    class="form-control"
                    name="inputKeyPlain"
                    placeholder="Enter key"
                    required>
        </div>

        <button type="submit" class="btn btn-primary">
            Encrypt
        </button>

    </form>


    <!-- SHOW ENCRYPT RESULT -->

    {% if encrypted_text %}

    <div class="alert alert-info mt-4">

        <h5>Encryption Result</h5>

        <table class="table table-bordered mt-3">

            <tr>
                <th>Plain Text</th>
                <th>Key</th>
                <th>Cipher Text</th>
            </tr>

            <tr>
                <td>{{ plain_text }}</td>
                <td>{{ key }}</td>
                <td><b>{{ encrypted_text }}</b></td>
            </tr>

        </table>

    </div>

    {% endif %}



    <hr class="mt-5 mb-4">


    <!-- ================= DECRYPT ================= -->

    <h4 class="text-success">DECRYPTION</h4>

    <form method="POST" action="/caesar/decrypt">

        <div class="form-group">
            <label>Cipher Text</label>
            <input
                    type="text"
                    class="form-control"
                    name="inputCipherText"
                    placeholder="Enter cipher text"
                    required>
        </div>

        <div class="form-group">
            <label>Key</label>
            <input
                    type="number"
                    class="form-control"
                    name="inputKeyCipher"
                    placeholder="Enter key"
                    required>
        </div>

        <button type="submit" class="btn btn-success">
            Decrypt
        </button>

    </form>


    <!-- SHOW DECRYPT RESULT -->

    {% if decrypted_text %}

    <div class="alert alert-success mt-4">

        <h5>Decryption Result</h5>

        <table class="table table-bordered mt-3">

            <tr>
                <th>Cipher Text</th>
                <th>Key</th>
                <th>Plain Text</th>
            </tr>

            <tr>
                <td>{{ cipher_text }}</td>
                <td>{{ key }}</td>
                <td><b>{{ decrypted_text }}</b></td>
            </tr>

        </table>

    </div>

    {% endif %}


</div>

</body>
</html>
