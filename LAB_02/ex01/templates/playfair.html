<!DOCTYPE html>
<html>
<head>
<title>Playfair Cipher</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container">

<h2 style="text-align:center;margin-top:20px;">PLAYFAIR CIPHER</h2>

<hr>

<h4 style="color:blue">ENCRYPTION</h4>

<form method="POST" action="/playfair/encrypt">

<label>Plain Text</label>
<input type="text" class="form-control" name="plain_text" value="{{plain_text if plain_text else ''}}">

<label>Key</label>
<input type="text" class="form-control" name="key" value="{{key if key else ''}}">

<br>

<button class="btn btn-primary">Encrypt</button>

</form>

{% if encrypted_text %}
<div class="alert alert-info mt-3">
<b>Encrypted Text:</b> {{encrypted_text}}
</div>
{% endif %}

<hr>

<h4 style="color:blue">DECRYPTION</h4>

<form method="POST" action="/playfair/decrypt">

<label>Cipher Text</label>
<input type="text" class="form-control" name="cipher_text" value="{{cipher_text if cipher_text else ''}}">

<label>Key</label>
<input type="text" class="form-control" name="key">

<br>

<button class="btn btn-success">Decrypt</button>

</form>

{% if decrypted_text %}
<div class="alert alert-success mt-3">
<b>Decrypted Text:</b> {{decrypted_text}}
</div>
{% endif %}

</div>

</body>
</html>
